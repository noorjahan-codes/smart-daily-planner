<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Daily Planner</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
    <h1>Smart Daily Planner</h1>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p id="loginError" style="color:red;"></p>
</div>

<!-- MAIN APP -->
<div id="appPage" class="container" style="display:none;">

    <h2 id="welcomeMsg"></h2>
    
    <div class="top-buttons">
    <button onclick="logout()">Logout</button>
    
    <div class="right-buttons">
        <button onclick="toggleDarkMode()">🌙</button>
        <button class="help-btn" onclick="toggleHelp()">❓</button>
    </div>
</div>

    <div id="helpBox" class="help-box">
        <h3>How to use:</h3>
        <ul>
            <li>Enter task and click Add to add tasks</li>
            <li>Add Date & Time (optional)</li>
            <li>Click on the task to mark completed</li>
            <li>Use Edit/Delete buttons to edit/delete the tasks</li>
            <li>Use Search to find tasks</li>
            <li>Use Filters to view tasks</li>
        </ul>
    </div>

    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchTask()">

    <div class="input-section">

    <div class="row">
        <label>Date:</label>
        <input type="date" id="taskDate">
    </div>

    <div class="row">
        <label>Time:</label>
        <input type="time" id="taskTime">
    </div>

    <input type="text" id="taskInput" placeholder="Enter task" onkeypress="handleEnter(event)">
    
    <button onclick="addTask()">Add</button>

</div>

    <div class="filter-buttons">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
